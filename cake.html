<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            background:url(a.jpeg);
            background-size:cover;
            background-repeat: no-repeat;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: red;
            margin-bottom: 40px;
            font-size: 2.3rem;
            text-align: center;
        }

        /* Cake Container */
        .cake-container {
            position: relative;
            cursor: pointer;
            width: 200px;
            height: 250px;
        }

        /* Candles */
        .candle-group {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .candle {
            width: 12px;
            height: 60px;
            background: linear-gradient(to right, #e63946, #f1faee);
            border-radius: 4px;
            position: relative;
        }

        .flame {
            width: 12px;
            height: 20px;
            background: #ffb703;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -22px;
            left: 0;
            box-shadow: 0 0 10px #ffb703;
            animation: flicker 0.3s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Cake Body */
        .cake {
            position: absolute;
            bottom: 20px;
            width: 200px;
            height: 130px;
            background:plum;
            border-radius: 10px 10px 0 0;
            box-shadow: inset 0 10px 0 #adc178;
            transition: all 1s ease-in-out;
        }

        .frosting {
            width: 100%;
            height: 40px;
            background:deeppink;
            border-radius: 10px 10px 0 0;
            position: absolute;
            top: 0;
        }

        /* Knife Line for Animation */
        .knife-cut {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 0;
            background: #f0e6ef;
            transform: translateX(-50%);
            transition: height 0.8s ease-in-out;
            z-index: 5;
        }

        /* Animation States */
        .candles-blown .flame {
            display: none;
        }

        .cake-cut .knife-cut {
            height: 100%;
        }

        .cake-cut .cake {
            transform: scaleX(0.95);
        }

        .instruction {
            margin-top: 30px;
            color:red;
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 id="title">Make a Wish!</h1>
   
    <div class="cake-container" id="cakeContainer" onclick="celebrate()">
        <div class="candle-group">
            <div class="candle"><div class="flame"></div></div>
            <div class="candle"><div class="flame"></div></div>
            <div class="candle"><div class="flame"></div></div>
        </div>
        <div class="cake">
            <div class="frosting"></div>
            <div class="knife-cut" id="knifeCut"></div>
        </div>
    </div>

    <p class="instruction" id="statusText">Click the candles to blow the candles!</p>

    <script>
        let step = 0;

        function celebrate() {
            const container = document.getElementById('cakeContainer');
            const status = document.getElementById('statusText');
            const title = document.getElementById('title');

            if (step === 0) {
                // Step 1: Blow Candles
                container.classList.add('candles-blown');
                title.innerText = "Now cut the cake!";
                status.innerText = "Click the cake to cut the cake!";
                step++;
            } else if (step === 1) {
                // Step 2: Cut Cake animation
                container.classList.add('cake-cut');
                status.innerText = "Opening your surprise...";
                step++;

                // Step 3: Redirect to second file after animation completes
                setTimeout(() => {
                    window.location.href = "wishes.html";
                }, 1500);
            }
        }
    </script>
</body>
</html>
